name: DevOps Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs


      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Image
        run: docker build -t myportfolio .


      - name: Push Image
        run: docker push myportfolio


      - name: Setup Pages
        uses: actions/configure-pages@v4


      - name: Upload Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .


      - name: Deploy Site
        uses: actions/deploy-pages@v4